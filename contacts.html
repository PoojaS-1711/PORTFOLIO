<!DOCTYPE html>
<html lang = "en">

<head>

  <meta charset = "utf-8" />

  <meta 
  name = "viewport" 
  content = "width = device - width, initial-scale=1.0" 
  />

  <title>Contact | POOJA S's Portfolio</title>

  <meta
    name = "Description"
    content = "Contact POOJA for web development, accessibility, and front-end projects."
  />

  <link rel = "stylesheet" href = "styles.css" />

</head>

<body>

  <a href = "#main-content" class = "skip-link">
    Skip to Primary content
  </a>

  <header role = "banner">
    <div class = "container">
      <h1>Contact Me</h1>

      <nav aria-label = "Primary Navigation">

        <ul class = "nav-list">

        <li>
            <a href = "portfolio.html">Home Page</a>
        </li>
        
        <li>
            <a href = "about.html">About Me</a>
        </li>
        
        <li>
            <a href = "projects.html">My Projects</a>
        </li>
        
        <li>
            <a href = "contacts.html" aria-current = "page">Contact Me</a>
        </li>

        </ul>
      </nav>
    </div>
  </header>

  <main id = "main-content">

    <section aria-labelledby = "contact-heading">
      
        <div class = "container">

        <h2 id = "contact-heading">Get In Touch</h2>

        <form
          action = "https://formsubmit.co/poojaswaminathan5@gmail.com"
          method = "post"
          aria-label = "Contact Form"
        >

        <input type = "hidden" name = "_captcha" value = "false">
        <input type = "hidden" name = "_subject" value = "New Portfolio Contact Message">
        

          <div class = "form-group">
            <label for = "name">Full Name</label>

            <input
              type = "text"
              id = "name"
              name = "name"
              required
              autocomplete = "name"
            />
          </div>

          <div class = "form-group">
            <label for = "email">Email Address</label>

            <input
              type = "email"
              id = "email"
              name = "email"
              required
              autocomplete = "email"
            />
          </div>

          <div class = "form-group">
            <label for = "message">Message</label>

            <textarea
              id = "message"
              name = "message"
              rows = "1"
              required
            ></textarea>
          </div>

        <button type = "submit">
            
            Send Message
          
        </button>

        </form>

      </div>
    </section>

  </main>

  <footer role="contentinfo">
    <div class="container">
      <p>&copy; 2026 POOJA S. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
